<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Color Palette</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body { margin: 0; font: 15px/1.5 system-ui, sans-serif; background: #0b0d12; color: #e6e8ef; padding: 20px; }
      h1 { font-size: 16px; margin: 0 0 14px; }
      .controls { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
      input[type="color"] { width: 44px; height: 44px; border: none; background: none; padding: 0; }
      select { border: 1px solid #23273a; background: #12151f; color: inherit; border-radius: 8px; padding: 8px; font: inherit; }
      .swatches { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
      .sw { height: 90px; border-radius: 10px; display: flex; align-items: flex-end; padding: 8px; cursor: pointer; }
      .sw code { background: rgba(0,0,0,.45); padding: 2px 6px; border-radius: 5px; font-size: 12px; }
      .hint { color: #8b90a0; font-size: 12px; margin-top: 12px; }
    </style>
  </head>
  <body>
    <h1>Color Palette</h1>
    <div class="controls">
      <input type="color" id="base" value="#2563eb" />
      <select id="scheme">
        <option value="analogous">Analogous</option>
        <option value="complementary">Complementary</option>
        <option value="triadic">Triadic</option>
        <option value="monochromatic">Monochromatic</option>
      </select>
    </div>
    <div class="swatches" id="swatches"></div>
    <div class="hint">Click a swatch to copy its hex.</div>

    <script>
      (function () {
        var $ = function (id) { return document.getElementById(id); };
        function hexToHsl(hex) {
          var r = parseInt(hex.slice(1, 3), 16) / 255, g = parseInt(hex.slice(3, 5), 16) / 255, b = parseInt(hex.slice(5, 7), 16) / 255;
          var mx = Math.max(r, g, b), mn = Math.min(r, g, b), h = 0, s = 0, l = (mx + mn) / 2;
          if (mx !== mn) {
            var d = mx - mn; s = l > 0.5 ? d / (2 - mx - mn) : d / (mx + mn);
            h = mx === r ? (g - b) / d + (g < b ? 6 : 0) : mx === g ? (b - r) / d + 2 : (r - g) / d + 4;
            h *= 60;
          }
          return [h, s * 100, l * 100];
        }
        function hslToHex(h, s, l) {
          h = (h % 360 + 360) % 360; s /= 100; l /= 100;
          var c = (1 - Math.abs(2 * l - 1)) * s, x = c * (1 - Math.abs((h / 60) % 2 - 1)), m = l - c / 2, r = 0, g = 0, b = 0;
          if (h < 60) { r = c; g = x; } else if (h < 120) { r = x; g = c; } else if (h < 180) { g = c; b = x; }
          else if (h < 240) { g = x; b = c; } else if (h < 300) { r = x; b = c; } else { r = c; b = x; }
          var to = function (v) { return ("0" + Math.round((v + m) * 255).toString(16)).slice(-2); };
          return "#" + to(r) + to(g) + to(b);
        }
        function palette(hex, scheme) {
          var hsl = hexToHsl(hex), h = hsl[0], s = hsl[1], l = hsl[2];
          if (scheme === "analogous") return [-40, -20, 0, 20, 40].map(function (d) { return hslToHex(h + d, s, l); });
          if (scheme === "complementary") return [0, 30, 180, 210, 180].map(function (d, i) { return hslToHex(h + d, s, i === 2 ? l : l + (i - 2) * 6); });
          if (scheme === "triadic") return [0, 120, 240, 60, 180].map(function (d) { return hslToHex(h + d, s, l); });
          return [l - 30, l - 15, l, l + 15, l + 30].map(function (nl) { return hslToHex(h, s, Math.max(8, Math.min(92, nl))); });
        }
        function render() {
          var cols = palette($("base").value, $("scheme").value);
          $("swatches").innerHTML = "";
          cols.forEach(function (c) {
            var d = document.createElement("div");
            d.className = "sw"; d.style.background = c;
            d.innerHTML = "<code>" + c + "</code>";
            d.onclick = function () { navigator.clipboard && navigator.clipboard.writeText(c); };
            $("swatches").appendChild(d);
          });
        }
        $("base").addEventListener("input", render);
        $("scheme").addEventListener("change", render);
        render();
      })();
    </script>
  </body>
</html>
